name: Validate and Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: deepeval-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deepeval:
    name: Run DeepEval Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 30

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
      DEEPEVAL_UPDATE_WARNING_OPT_IN: "NO"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Verify OpenAI API key is configured
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::OPENAI_API_KEY secret is not configured. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run DeepEval tests
        run: uv run deepeval test run ./test

      - name: Upload DeepEval test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepeval-results
          path: |
            .deepeval/.latest_test_run.json
            .deepeval/.deepeval-cache.json
          if-no-files-found: ignore
          retention-days: 7
